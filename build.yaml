# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top-level
# board and shield arrays. For more control, add individual board +
# shield combinations to the include list.
#
# board: [ "nice_nano//zmk" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano//zmk
#     shield: reviung41
#
# Build matrix for this custom Corne V3 split + dongle setup.
---
include:
  - board: "nice_nano//zmk"
    shield: corne_v3_left
  - board: "nice_nano//zmk"
    shield: corne_v3_right
  - board: "nice_nano//zmk"
    shield: corne_v3_dongle
  - board: "nice_nano//zmk"
    shield: settings_reset
