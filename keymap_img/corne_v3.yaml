combos:
- p: [10, 11]
  k: F12
  l: [num]
- p: [4, 7]
  k: '&macro_brackets'
  l: [nav]
- p: [16, 19]
  k: '&macro_parens'
  l: [nav]
- p: [25, 34]
  k: '&bootloader'
  l: [bt]
